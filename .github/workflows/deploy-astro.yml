name: Deploy Astro Site to GitHub Pages

on:
  workflow_run:
    workflows:
      [
        "Update today Sukka Rulesets",
        "Update today National Database of Laws and Regulations",
        "Update today Xinwen Lianbo",
      ]
    types:
      - completed
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Enable long paths
        run: git config --global core.longpaths true

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.2.0
          cache: pnpm

      - name: Get pnpm store directory
        id: pnpm-cache
        run: |
          echo "pnpm_cache_dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.pnpm_cache_dir }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: cd docs && pnpm install --frozen-lockfile --prefer-offline --ignore-scripts

      - name: Setup build cache
        uses: actions/cache@v4
        with:
          path: |
            docs/.astro/
            docs/node_modules/.vite/
            docs/node_modules/.cache/
          key: ${{ runner.os }}-astro-build-${{ hashFiles('docs/src/**/*.js', 'docs/src/**/*.jsx', 'docs/src/**/*.ts', 'docs/src/**/*.tsx', 'docs/src/**/*.astro') }}
          restore-keys: |
            ${{ runner.os }}-astro-build-

      - name: Lint
        run: cd docs && pnpm run lint
        continue-on-error: true

      - name: Format
        run: cd docs && pnpm run format
        continue-on-error: true

      - name: Build
        run: cd docs && pnpm run build

      - name: Post-build optimizations
        run: |
          echo "Optimizing assets"
          find docs/dist -type f -name "*.js" -exec gzip -9 -k {} \; &
          find docs/dist -type f -name "*.css" -exec gzip -9 -k {} \; &
          find docs/dist -type f -name "*.html" -exec gzip -9 -k {} \; &
          find docs/dist -type f -name "*.js" -exec brotli -q 11 -k {} \; &
          find docs/dist -type f -name "*.css" -exec brotli -q 11 -k {} \; &
          find docs/dist -type f -name "*.html" -exec brotli -q 11 -k {} \; &
          wait
          echo "Optimization complete"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs/dist"
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 5
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 600000

      - name: Validate deployment
        run: |
          if [[ "${{ steps.deployment.outcome }}" == "success" ]]; then
            echo "Deployment successful! Site available at ${{ steps.deployment.outputs.page_url }}"
          else
            echo "Deployment failed"
            exit 1
          fi
