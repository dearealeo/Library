name: Publish today Release

on:
  workflow_run:
    workflows:
      [
        "Update today National Database of Laws and Regulations",
        "Update today Xinwen Lianbo",
        "Update today Sukka Rulesets",
      ]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Data
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    outputs:
      date: ${{ steps.date.outputs.full_date }}
      year: ${{ steps.date.outputs.year }}
      month: ${{ steps.date.outputs.month }}
      day: ${{ steps.date.outputs.day }}
      workflows: ${{ steps.set-matrix.outputs.workflows }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Get current date
        id: date
        run: |
          TZ=Asia/Shanghai date +'year=%y\nmonth=%m\nday=%d\nfull_date=%Y-%m-%d' >> $GITHUB_OUTPUT
          
      - name: Set workflow matrix
        id: set-matrix
        run: |
          echo "workflows=[\"国家法律法规数据库\",\"新闻联播\",\"Sukka_Rulesets\"]" >> $GITHUB_OUTPUT

  build:
    name: Build Archive for ${{ matrix.workflow }}
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        workflow: ${{fromJson(needs.prepare.outputs.workflows)}}
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}
          lfs: true
          
      - name: Install dependencies
        run: |
          DEBIAN_FRONTEND=noninteractive apt-get update -qq && apt-get install -y --no-install-recommends p7zip-full pigz zstd parallel xxhash
          [ -w /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor ] && echo performance | sudo tee /sys/devices/system/cpu/cpu*/cpufreq/scaling_governor
          
      - name: Create archive for ${{ matrix.workflow }}
        id: create_archive
        env:
          WORKFLOW_NAME: ${{ matrix.workflow }}
          DATE: ${{ needs.prepare.outputs.full_date }}
          MAX_SIZE: 2147483648
          ZSTD_CLEVEL: 19
          ZSTD_NBTHREADS: 0
        run: |
          declare -A DIR_MAP=( ["国家法律法规数据库"]="./data/laws" ["新闻联播"]="./data/xinwen" ["Sukka_Rulesets"]="./data/rulesets" )
          SOURCE_DIR="${DIR_MAP[$WORKFLOW_NAME]}"
          
          [ -z "$SOURCE_DIR" ] && { echo "Unknown workflow: $WORKFLOW_NAME"; exit 1; }
          
          ARCHIVE_NAME="${WORKFLOW_NAME}_${DATE}.tar.zst"
          
          echo "Creating compressed archive for $WORKFLOW_NAME from $SOURCE_DIR"
          [ -d "$SOURCE_DIR" ] || { echo "Source directory $SOURCE_DIR not found"; exit 1; }
          
          tar -cf - -C "$(dirname "$SOURCE_DIR")" "$(basename "$SOURCE_DIR")" | zstd -T$ZSTD_NBTHREADS -$ZSTD_CLEVEL --ultra --long=31 - -o "$ARCHIVE_NAME"
          
          ARCHIVE_SIZE=$(stat -c%s "$ARCHIVE_NAME")
          echo "Compressed archive size: $ARCHIVE_SIZE bytes"
          
          if [ "$ARCHIVE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "Compressed archive exceeds size limit, applying splitting strategy"
            
            TEMP_DIR=$(mktemp -d)
            trap 'rm -rf "$TEMP_DIR"' EXIT INT TERM
            
            original_hash=$(xxh64sum "$ARCHIVE_NAME" | cut -d" " -f1)
            original_size=$ARCHIVE_SIZE
            
            echo "Processing: $ARCHIVE_NAME ($original_size bytes)"
            split_dir="${WORKFLOW_NAME}_split"
            mkdir -p "$split_dir"
            
            manifest="$split_dir/manifest.txt"
            {
              echo "Original file: $ARCHIVE_NAME"
              echo "Original size: $original_size bytes"
              echo "Original xxHash: $original_hash"
              echo "Split timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              echo "Parts:"
            } > "$manifest"
            
            split -b 1500M --numeric-suffixes=1 --suffix-length=3 "$ARCHIVE_NAME" "$TEMP_DIR/part_"
            
            find "$TEMP_DIR" -name "part_*" -type f -print0 | sort -z |
            parallel -0 --halt now,fail=1 --jobs 80% '\
              part={}; \
              part_name=$(basename "$part"); \
              part_hash=$(xxh64sum "$part" | cut -d" " -f1); \
              cp --reflink=auto --sparse=always --preserve=timestamps "$part" "$split_dir/$part_name"; \
              verify_hash=$(xxh64sum "$split_dir/$part_name" | cut -d" " -f1); \
              [ "$part_hash" = "$verify_hash" ] || { echo "ERROR: Hash verification failed for $part_name" >&2; exit 1; }; \
              echo "$part_name: $part_hash (split part)" >> "$manifest";'
            
            rm -f "$ARCHIVE_NAME"
            echo "ARCHIVE_PATH=${split_dir}" >> $GITHUB_OUTPUT
          else
            echo "ARCHIVE_PATH=${ARCHIVE_NAME}" >> $GITHUB_OUTPUT
          fi
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.workflow }}_archive
          path: ${{ steps.create_archive.outputs.ARCHIVE_PATH }}
          retention-days: 1

  publish:
    name: Publish Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          
      - name: Get commit history
        id: commits
        run: |
          {
            echo "commits<<EOF"
            git -c log.showSignature=false log --pretty=format:"- %s (%h)" --since="24 hours ago" --no-merges
            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: v${{ needs.prepare.outputs.year }}.${{ needs.prepare.outputs.month }}.${{ needs.prepare.outputs.day }}
          name: Release ${{ needs.prepare.outputs.year }}.${{ needs.prepare.outputs.month }}.${{ needs.prepare.outputs.day }}
          body: |
            Release ${{ needs.prepare.outputs.date }}

            Recent commits:
            ${{ steps.commits.outputs.commits }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            ./artifacts/**/*
