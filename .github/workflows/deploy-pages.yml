name: Deploy GitHub Pages

on:
  workflow_run:
    workflows:
      [
        "Update today Sukka Rulesets",
        "Update today National Database of Laws and Regulations",
        "Update today Xinwen Lianbo",
      ]
    types:
      - completed
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: pip install markdown2

      - name: Create directory structure
        run: |
          mkdir -p ./public
          cp -r ./docs/* ./public/
          mkdir -p ./public/{sukka-ruleset,laws/{constitution,laws-list,administrative-regulations,local-regulations,judicial-interpretations,supervisory-regulations},news/{2022,2023,2024,2025}}

      - name: Process Sukka Ruleset content
        run: |
          SUKKA_DIR="./Sukka Ruleset"
          [ -d "$SUKKA_DIR/dist" ] && [ "$(ls -A "$SUKKA_DIR/dist")" ] && {
            find "$SUKKA_DIR/dist" -type f -not -name "404.html" -not -name "_headers" -not -name "index.html" -not -name "README.md" -exec cp {} ./public/sukka-ruleset/ \;

            find "$SUKKA_DIR/dist" -mindepth 1 -maxdepth 1 -type d -print0 | xargs -0 -I{} bash -c 'dir="{}"; dir_name=$(basename "$dir"); mkdir -p "./public/sukka-ruleset/$dir_name"; find "$dir" -type f -exec cp {} "./public/sukka-ruleset/$dir_name/" \;'

            find ./public/sukka-ruleset -type f -name "*.html" -not -path "./public/sukka-ruleset/index.html" -print0 | xargs -0 -P $(nproc) sed -i 's|href="\([A-Za-z0-9/\-]*\)"|href="/Library/sukka-ruleset/\1"|g; s|src="\([^"]*\)"|src="/Library/sukka-ruleset/\1"|g'

            find ./public/sukka-ruleset -mindepth 1 -maxdepth 1 -type d -print0 | xargs -0 -I{} bash -c 'dir="{}"; dir_name=$(basename "$dir"); find "$dir" -type f -name "*.html" -not -path "./public/sukka-ruleset/$dir_name/index.html" -print0 | xargs -0 -P $(nproc) sed -i "s|href=\"\\([^\"]*\\)\"|href=\"/Library/sukka-ruleset/$dir_name/\\1\"|g; s|src=\"\\([^\"]*\\)\"|src=\"/Library/sukka-ruleset/$dir_name/\\1\"|g"'
          }

      - name: Process National Database of Laws and Regulations content
        run: |
          declare -A dir_map=( ["宪法"]="constitution" ["法律"]="laws-list" ["行政法规"]="administrative-regulations" ["地方性法规"]="local-regulations" ["司法解释"]="judicial-interpretations" ["监察法规"]="supervisory-regulations" )

          LAWS_DIR="./国家法律法规数据库"
          for src_dir in "${!dir_map[@]}"; do
            [ -d "$LAWS_DIR/$src_dir" ] && cp -r "$LAWS_DIR/$src_dir/"* "./public/laws/${dir_map[$src_dir]}/"
          done

          law_header='<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <meta http-equiv="X-UA-Compatible" content="IE=edge">
              <meta http-equiv="Content-Security-Policy" content="default-src '\''self'\''; style-src '\''unsafe-inline'\'' '\''self'\''; script-src '\''self'\''">
              <title>National Database of Laws and Regulations</title>
              <style>
                  :root{--g1:rgb(142,142,147);--g2:rgb(174,174,178);--g3:rgb(199,199,204);--g4:rgb(209,209,214);--g5:rgb(229,229,234);--g6:rgb(242,242,247);--bg:#fff;--tx:rgb(28,28,30)}
                  @media(prefers-color-scheme:dark){:root{--g1:rgb(142,142,147);--g2:rgb(99,99,102);--g3:rgb(72,72,74);--g4:rgb(58,58,60);--g5:rgb(44,44,46);--g6:rgb(28,28,30);--bg:rgb(28,28,30);--tx:rgb(242,242,247)}}
                  body{font-family:system-ui,-apple-system,sans-serif;line-height:1.6;color:var(--tx);background:var(--bg);max-width:900px;margin:0 auto;padding:20px;text-size-adjust:100%;-webkit-font-smoothing:antialiased}
                  h1,h2,h3,h4,h5,h6{color:var(--tx);text-rendering:optimizeLegibility}
                  header{margin-bottom:30px}
                  header a{text-decoration:none;color:var(--g1);touch-action:manipulation}
                  header a:hover{text-decoration:underline}
                  article{margin-top:20px;background:var(--bg);padding:20px;border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
                  a{color:var(--g1);touch-action:manipulation}
                  a:hover{text-decoration:underline}
                  footer{margin-top:30px;color:var(--g2);font-size:0.9em;text-align:center}
              </style>
              <link rel="preload" href="/Library/laws/" as="document">
              <link rel="dns-prefetch" href="https://github.com">
          </head>
          <body>
              <header>
                  <p><a href="/Library/laws/">Back to National Database of Laws and Regulations</a></p>
              </header>
              <article>'

          law_footer='</article>
              <footer>
                  &copy; <script>document.write(new Date().getFullYear())</script> Library
              </footer>
          </body>
          </html>'

          cat > convert_md.py << 'EOF'
          import sys
          import markdown2

          if len(sys.argv) != 4:
              sys.exit(1)

          input_file, header_file, footer_file = sys.argv[1:4]

          with open(input_file, 'r', encoding='utf-8') as f:
              md_content = f.read()

          with open(header_file, 'r', encoding='utf-8') as f:
              header = f.read()

          with open(footer_file, 'r', encoding='utf-8') as f:
              footer = f.read()

          print(header + markdown2.markdown(md_content, extras=['tables', 'fenced-code-blocks']) + footer)
          EOF

          echo "$law_header" > law_header.html
          echo "$law_footer" > law_footer.html

          find ./public/laws -type f -name "*.md" -print0 | xargs -0 -P $(nproc) -I{} bash -c 'python convert_md.py "$1" law_header.html law_footer.html > "${1%.md}.html"' _ {}

          redirect_html='<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <meta http-equiv="X-UA-Compatible" content="IE=edge">
              <meta http-equiv="Content-Security-Policy" content="default-src '\''self'\''; style-src '\''unsafe-inline'\'' '\''self'\''; script-src '\''self'\''">
              <title>National Database of Laws and Regulations</title>
              <meta http-equiv="refresh" content="0;url=/Library/laws/">
              <style>:root{--g1:rgb(142,142,147);--tx:rgb(28,28,30);--bg:#fff}@media(prefers-color-scheme:dark){:root{--g1:rgb(142,142,147);--tx:rgb(242,242,247);--bg:rgb(28,28,30)}}body{font-family:system-ui,-apple-system,sans-serif;color:var(--tx);background:var(--bg);text-align:center;padding:20px}</style>
          </head>
          <body><p>Redirecting to National Database of Laws and Regulations...</p></body>
          </html>'

          printf '%s\n' "${dir_map[@]}" | xargs -P $(nproc) -I{} bash -c '[ ! -f "./public/laws/{}/index.html" ] && echo "$0" > "./public/laws/{}/index.html"' "$redirect_html"

          [ -f "$LAWS_DIR/README.md" ] && cp "$LAWS_DIR/README.md" ./public/laws/README.md

      - name: Process Xinwen Lianbo content
        run: |
          news_header='<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <meta http-equiv="X-UA-Compatible" content="IE=edge">
              <meta http-equiv="Content-Security-Policy" content="default-src '\''self'\''; style-src '\''unsafe-inline'\'' '\''self'\''; script-src '\''self'\''">
              <title>Xinwen Lianbo</title>
              <style>
                  :root{--g1:rgb(142,142,147);--g2:rgb(174,174,178);--g3:rgb(199,199,204);--g4:rgb(209,209,214);--g5:rgb(229,229,234);--g6:rgb(242,242,247);--bg:#fff;--tx:rgb(28,28,30)}
                  @media(prefers-color-scheme:dark){:root{--g1:rgb(142,142,147);--g2:rgb(99,99,102);--g3:rgb(72,72,74);--g4:rgb(58,58,60);--g5:rgb(44,44,46);--g6:rgb(28,28,30);--bg:rgb(28,28,30);--tx:rgb(242,242,247)}}
                  body{font-family:system-ui,-apple-system,sans-serif;line-height:1.6;color:var(--tx);background:var(--bg);max-width:900px;margin:0 auto;padding:20px;text-size-adjust:100%;-webkit-font-smoothing:antialiased}
                  h1,h2,h3,h4,h5,h6{color:var(--tx);text-rendering:optimizeLegibility}
                  header{margin-bottom:30px}
                  header a{text-decoration:none;color:var(--g1);touch-action:manipulation}
                  header a:hover{text-decoration:underline}
                  article{margin-top:20px;background:var(--bg);padding:20px;border-radius:5px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
                  a{color:var(--g1);touch-action:manipulation}
                  a:hover{text-decoration:underline}
                  footer{margin-top:30px;color:var(--g2);font-size:0.9em;text-align:center}
                  .date-display{color:var(--g2);font-size:0.9em;margin-bottom:20px}
              </style>
              <link rel="preload" href="/Library/news/" as="document">
              <link rel="dns-prefetch" href="https://tv.cctv.com">
          </head>
          <body>
              <header>
                  <p><a href="/Library/news/">Back to Xinwen Lianbo</a></p>
              </header>
              <article>'

          news_footer='</article>
              <footer>
                  &copy; <script>document.write(new Date().getFullYear())</script> Library
              </footer>
          </body>
          </html>'

          echo "$news_header" > news_header.html
          echo "$news_footer" > news_footer.html

          redirect_template='<!DOCTYPE html>
          <html lang="zh-CN">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width,initial-scale=1">
              <meta http-equiv="X-UA-Compatible" content="IE=edge">
              <meta http-equiv="Content-Security-Policy" content="default-src '\''self'\''; style-src '\''unsafe-inline'\'' '\''self'\''; script-src '\''self'\''">
              <title>Xinwen Lianbo __YEAR__-__MONTH__</title>
              <meta http-equiv="refresh" content="0;url=/Library/news/">
              <style>:root{--g1:rgb(142,142,147);--tx:rgb(28,28,30);--bg:#fff}@media(prefers-color-scheme:dark){:root{--g1:rgb(142,142,147);--tx:rgb(242,242,247);--bg:rgb(28,28,30)}}body{font-family:system-ui,-apple-system,sans-serif;color:var(--tx);background:var(--bg);text-align:center;padding:20px}</style>
          </head>
          <body><p>Redirecting to Xinwen Lianbo...</p></body>
          </html>'

          NEWS_DIR="./新闻联播"
          for year in 2022 2023 2024 2025; do
            [ -d "$NEWS_DIR/$year" ] && {
              find "$NEWS_DIR/$year" -type d | xargs -P $(nproc) -I{} mkdir -p "./public/news/{}"
              find "$NEWS_DIR/$year" -type f -name "*.md" | xargs -P $(nproc) -I{} cp {} "./public/news/{}"

              find "$NEWS_DIR/$year" -type d -mindepth 1 -maxdepth 1 -print0 | xargs -0 -P $(nproc) -I{} bash -c 'dir="{}"; month_name=$(basename "$dir"); target_dir="./public/news/$(basename $(dirname "$dir"))/$month_name"; mkdir -p "$target_dir"; sed "s/__YEAR__/$(basename $(dirname "$dir"))/g; s/__MONTH__/$month_name/g" <<< "$0" > "$target_dir/index.html"' "$redirect_template"
            }
          done

          find ./public/news -type f -name "*.md" -print0 | xargs -0 -P $(nproc) -I{} bash -c '
            file="$1"
            base_name="${file%.md}"
            file_date=$(basename "$file" .md)
            printf "%s\n<div class=\"date-display\">%s</div>" "$(cat news_header.html)" "$file_date" > "$base_name.temp_header"
            python convert_md.py "$file" "$base_name.temp_header" news_footer.html > "$base_name.html"
            rm "$base_name.temp_header"
          ' _ "{}"

          [ -f "$NEWS_DIR/README.md" ] && cp "$NEWS_DIR/README.md" ./public/news/README.md
          [ -f "$NEWS_DIR/catalogue.json" ] && cp "$NEWS_DIR/catalogue.json" ./public/news/catalogue.json

      - name: Fix base URLs in HTML files
        run: |
          find ./public -type f -name "*.html" -not -path "./public/index.html" -not -path "./public/404.html" -not -path "./public/sukka-ruleset/index.html" -not -path "./public/laws/index.html" -not -path "./public/news/index.html" -print0 | xargs -0 -P $(nproc) sed -i 's|href="/\([^L]\)|href="/Library/\1|g; s|href="/L\([^i]\)|href="/Library/L\1|g; s|href="/Li\([^b]\)|href="/Library/Li\1|g; s|href="/Lib\([^r]\)|href="/Library/Lib\1|g; s|href="/Libr\([^a]\)|href="/Library/Libr\1|g; s|href="/Libra\([^r]\)|href="/Library/Libra\1|g; s|href="/Librar\([^y]\)|href="/Library/Librar\1|g; s|href="/Library\([^/]\)|href="/Library/\1|g; s|src="/\([^L]\)|src="/Library/\1|g; s|src="/L\([^i]\)|src="/Library/L\1|g; s|src="/Li\([^b]\)|src="/Library/Li\1|g; s|src="/Lib\([^r]\)|src="/Library/Lib\1|g; s|src="/Libr\([^a]\)|src="/Library/Libr\1|g; s|src="/Libra\([^r]\)|src="/Library/Libra\1|g; s|src="/Librar\([^y]\)|src="/Library/Librar\1|g; s|src="/Library\([^/]\)|src="/Library/\1|g'
          find ./public -type f -name "*.html" -print0 | xargs -0 -P $(nproc) sed -i 's|href="/Library/http|href="http|g; s|src="/Library/http|src="http|g'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./public"
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
