version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    reviewers:
      - "dearealeo"
    assignees:
      - "dearealeo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(ci)"

  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    reviewers:
      - "dearealeo"
    assignees:
      - "dearealeo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(submod)"

  - package-ecosystem: "pip"
    directory: "/国家法律法规数据库"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    reviewers:
      - "dearealeo"
    assignees:
      - "dearealeo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(laws)"

  - package-ecosystem: "pip"
    directory: "/新闻联播"
    schedule:
      interval: "daily"
    labels:
      - "dependencies"
    reviewers:
      - "dearealeo"
    assignees:
      - "dearealeo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps(news)"
