<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline' 'self'">
    <title>Page Not Found</title>
    <style>
        :root{--g1:rgb(142,142,147);--g2:rgb(174,174,178);--g3:rgb(199,199,204);--g4:rgb(209,209,214);--g5:rgb(229,229,234);--g6:rgb(242,242,247);--bg:#fff;--tx:rgb(28,28,30)}
        @media(prefers-color-scheme:dark){:root{--g1:rgb(142,142,147);--g2:rgb(99,99,102);--g3:rgb(72,72,74);--g4:rgb(58,58,60);--g5:rgb(44,44,46);--g6:rgb(28,28,30);--bg:rgb(28,28,30);--tx:rgb(242,242,247)}}
        body{font-family:system-ui,-apple-system,sans-serif;line-height:1.6;color:var(--tx);background:var(--bg);max-width:800px;margin:0 auto;padding:20px;text-align:center;text-size-adjust:100%;-webkit-font-smoothing:antialiased}
        h1{color:var(--tx);font-size:3em;margin-bottom:.5em;text-rendering:optimizeLegibility}
        .e{font-size:8em;color:var(--g1);margin:0;line-height:1;font-weight:700}
        .c{margin-top:2em;contain:content}
        .m{font-size:1.2em;margin-bottom:2em}
        .b{display:inline-block;padding:10px 20px;text-decoration:none;background:var(--g1);color:var(--bg);border-radius:4px;font-size:16px;transition:background-color .2s;touch-action:manipulation;cursor:pointer;user-select:none;border:0}
        .b:hover{background:var(--g2)}
        footer{margin-top:3em;color:var(--g2);font-size:.9em}
    </style>
    <link rel="prefetch" href="/Library/">
</head>
<body>
    <div class="c">
        <p class="e">404</p>
        <h1>Page Not Found</h1>
        <div class="m">
            <p>Sorry, the page you are looking for does not exist or has been removed.</p>
            <p>Please check the URL or return to the homepage.</p>
        </div>
        <a href="/Library/" class="b">Return to Homepage</a>
    </div>

    <footer>
        &copy; <script>document.write(new Date().getFullYear())</script> Library
    </footer>
</body>
</html>
